<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SyncWatch — Room</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0d0d0d; color: #eee; overflow: hidden; }

    /* ── Bridge warning ──────────────────────────────── */
    #bridge-status {
      display: none; padding: 8px 14px;
      background: #2a1a00; border-bottom: 1px solid #7a4a00;
      font-size: 12px; color: #fbbf24; flex-shrink: 0;
    }
    #bridge-status a { color: #fcd34d; }

    /* ── URL bar (host only) ─────────────────────────── */
    #url-bar {
      display: flex; gap: 8px; padding: 8px 12px;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    }
    #url-bar input {
      flex: 1; padding: 7px 10px; background: #2a2a2a;
      border: 1px solid #3a3a3a; color: #eee; border-radius: 6px; font-size: 13px;
    }
    #url-bar input:focus { outline: none; border-color: #6c3fc5; }
    #url-bar button {
      padding: 7px 16px; background: #6c3fc5; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    #url-bar button:hover { background: #7d50d6; }

    /* ── Full-height layout ──────────────────────────── */
    #layout { display: flex; flex-direction: column; height: 100vh; }
    #layout-body { display: flex; flex: 1; overflow: hidden; }

    /* ── Player column ───────────────────────────────── */
    #player-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #player-wrap { position: relative; flex: 1; background: #000; }
    #player-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    #player-overlay {
      position: absolute; inset: 0; pointer-events: none;
      background: transparent; transition: background 0.15s;
    }
    #player-overlay.flash { background: rgba(108,63,197,0.08); }

    #controls {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; background: #1a1a1a; border-top: 1px solid #2a2a2a; flex-shrink: 0;
    }
    #controls button {
      padding: 5px 12px; background: #2a2a2a; color: #eee;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    #controls button:hover { background: #3a3a3a; }
    #sync-status { margin-left: auto; font-size: 12px; color: #888; }

    #kb-hint { font-size: 11px; color: #444; padding: 3px 12px 5px; background: #1a1a1a; flex-shrink: 0; }

    /* ── Chat panel ──────────────────────────────────── */
    #chat-panel {
      width: 280px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: #111; border-left: 1px solid #1e1e1e;
    }
    #voice-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #161616; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
    }
    #mic-btn {
      padding: 5px 12px; background: #2a2a2a; color: #eee;
      border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    #mic-btn:hover { background: #3a3a3a; }
    #voice-status { font-size: 12px; color: #555; }

    #chat-log { flex: 1; overflow-y: auto; padding: 8px 10px; font-size: 13px; }
    .chat-msg { margin: 5px 0; line-height: 1.5; }
    .chat-msg.self .chat-name { color: #a07ef5; }
    .chat-name { font-weight: 600; color: #666; margin-right: 4px; }
    .chat-text { color: #ccc; word-break: break-word; }
    .chat-time { font-size: 11px; color: #3a3a3a; margin-left: 6px; }

    #reaction-bar {
      display: flex; flex-wrap: wrap; gap: 2px;
      padding: 5px 8px; border-top: 1px solid #1e1e1e; flex-shrink: 0;
    }
    #reaction-bar button {
      background: none; border: none; font-size: 17px;
      cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1;
    }
    #reaction-bar button:hover { background: #2a2a2a; }

    #chat-input-row {
      display: flex; gap: 6px; padding: 8px;
      border-top: 1px solid #1e1e1e; flex-shrink: 0;
    }
    #chat-input {
      flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; color: #eee;
      border-radius: 6px; padding: 7px 10px; font-size: 13px;
    }
    #chat-input:focus { outline: none; border-color: #6c3fc5; }
    #chat-send {
      padding: 7px 13px; background: #6c3fc5; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    #chat-send:hover { background: #7d50d6; }

    /* ── Watcher: hide host-only elements ────────────── */
    body.watcher #url-bar         { display: none; }
    body.watcher #host-ctrls      { display: none; }
    body.watcher #kb-hint         { display: none; }
    body.watcher #player-overlay  { pointer-events: none; }
  </style>
</head>
<body>

<div id="layout">
  <div id="bridge-status">
    ⚠️ <strong>Bridge not detected</strong> — buttons won't control the video.
    <a href="install-bridge.html" target="_blank">Install guide</a>
  </div>

  <div id="url-bar">
    <input id="stream-url" placeholder="Paste embed URL — e.g. https://vidsrc.to/embed/movie/tt0111161" />
    <button onclick="loadStream()">Load</button>
  </div>

  <div id="layout-body">

    <!-- ── Player column ─────────────────────────────── -->
    <div id="player-col">
      <div id="player-wrap">
        <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
        <div id="player-overlay"></div>
      </div>
      <div id="controls">
        <span id="host-ctrls" style="display:contents">
          <button onclick="sendPlay()">▶ Play</button>
          <button onclick="sendPause()">⏸ Pause</button>
          <button onclick="sendSeek(-30)">⏪ −30s</button>
          <button onclick="sendSeek(-10)">⏪ −10s</button>
          <button onclick="sendSeek(+10)">⏩ +10s</button>
          <button onclick="sendSeek(+30)">⏩ +30s</button>
        </span>
        <span id="sync-status">Waiting for stream…</span>
      </div>
      <div id="kb-hint">Space = play/pause &nbsp;·&nbsp; ← → = ±10s &nbsp;·&nbsp; Shift+← → = ±30s</div>
    </div>

    <!-- ── Chat panel ─────────────────────────────────── -->
    <div id="chat-panel">
      <div id="voice-bar">
        <button id="mic-btn" onclick="toggleMute()">🎙 Join voice</button>
        <span id="voice-status">Voice off</span>
      </div>
      <div id="chat-log"></div>
      <div id="reaction-bar"></div>
      <div id="chat-input-row">
        <input id="chat-input" placeholder="Message…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendChatMsg(this.value);event.preventDefault();}" />
        <button id="chat-send"
          onclick="sendChatMsg(document.getElementById('chat-input').value)">→</button>
      </div>
    </div>

  </div>
</div>

<script src="ws.js"></script>
<script>
  // ── Shared globals — read by player.js, voice.js, chat.js ────────────────
  const serverUrl = localStorage.getItem('sw_server') || (() => {
    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    return proto + location.host;
  })();
  const ws     = new SyncWatchWS(serverUrl);
  const code   = localStorage.getItem('sw_code');
  const role   = localStorage.getItem('sw_role');
  const myId   = localStorage.getItem('sw_id');
  const myName = localStorage.getItem('sw_name');

  if (role === 'watcher') document.body.classList.add('watcher');

  // Re-join the room on WS open (handles reconnects too)
  ws._ws.addEventListener('open', () => {
    if (role === 'host') ws.send({ type: 'CREATE_ROOM', displayName: myName });
    else                 ws.send({ type: 'JOIN_ROOM', code, displayName: myName });
  }, { once: true });

  // Focus reclaim — stop iframe from eating keyboard events
  window.addEventListener('blur', () => {
    if (role !== 'host') return;
    setTimeout(() => {
      window.focus(); document.body.focus();
      const ov = document.getElementById('player-overlay');
      ov.classList.add('flash');
      setTimeout(() => ov.classList.remove('flash'), 400);
    }, 50);
  });

  // Keyboard shortcuts (host only)
  document.addEventListener('keydown', (e) => {
    if (role !== 'host') return;
    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
    if (e.code === 'Space') {
      e.preventDefault();
      if (typeof localPlaying !== 'undefined') localPlaying ? sendPause() : sendPlay();
    }
    if (e.code === 'ArrowLeft')  { e.preventDefault(); sendSeek(e.shiftKey ? -30 : -10); }
    if (e.code === 'ArrowRight') { e.preventDefault(); sendSeek(e.shiftKey ? +30 : +10); }
  });
</script>
<script src="player.js"></script>
<script src="voice.js"></script>
<script src="chat.js"></script>
<script>
  initChat();
</script>
</body>
</html>
